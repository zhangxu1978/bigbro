<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情节管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/assistant.css">
    <link rel="stylesheet" href="./styles/plot-manager.css">
</head>
<body>
    <div class="container">
        <div class="plot-list">
            <h2>情节管理</h2>
            <button onclick="showAddModal()" class="add-button">
                <i class="fas fa-plus"></i> 添加情节
            </button>
            <div id="plotList" class="plot-grid"></div>
        </div>
    </div>

    <!-- 添加/编辑情节的模态框 -->
    <div id="plotModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">添加情节</h3>
            <form id="plotForm">
                <input type="hidden" id="plotId">
                <div class="form-group plot-row">
                    <div class="input-field">
                        <label for="plotName">情节名称：</label>
                        <input type="text" id="plotName" required>
                    </div>
                    <div class="input-field">
                        <label for="plotCategory">分类：</label>
                        <input type="text" id="plotCategory" placeholder="可选">
                    </div>
                    <div class="input-field">
                        <label for="plotTags">标签：</label>
                        <input type="text" id="plotTags" placeholder="多个标签用逗号分隔">
                    </div>
                </div>
                <div class="form-group">
                    <label for="plotDescription">情节描述：</label>
                    <textarea id="plotDescription" class="large-description" required></textarea>
                </div>

                <div class="button-group">
                    <button type="button" onclick="closeModal()" class="control-button">取消</button>
                    <button type="submit" class="control-button">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./scripts/plot-manager.js"></script>
</body>
</html>
